  - Internet Service Provider
  - Cable
  - Network Provisioning
  - Broadband
  - Spectrum
  - NaaS
  - Enterprise
apis:
  - aid: charter:spectrum-enterprise-api
    name: Spectrum Enterprise Client API
    description: The Spectrum Enterprise Open API provides B2B REST API access for enterprise clients to integrate directly with the Spectrum Enterprise portal. It supports automated ticket creation and management, circuit and site account retrieval, network alarm submission, and serviceability lookups. Authentication uses OAuth 2.0 client credentials via the PiNxt onboarding platform.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://enterprise.spectrum.com/support/faqs/api-faqs.html
    baseURL: https://apis.spectrum.net
    tags:
      - Enterprise
      - Ticketing
      - Circuit Management
      - Network Alarms
      - OAuth 2.0
    properties:
      - type: Documentation
        url: https://enterprise.spectrum.com/content/dam/spectrum/enterprise/en/pdfs/support/SE-B2B-API-Guide-v1.905.pdf
      - type: TermsOfService
        url: https://enterprise.spectrum.com/legal/terms-and-conditions/customer-api-terms-and-conditions-for-enterprise-services.html

  - aid: charter:bryte-iq-api
    name: Bryte IQ Network-as-a-Service API
    description: Bryte IQ is Charter Communications' NaaS developer platform built on the Linux Foundation's CAMARA open API framework. Launched in September 2024, it provides secure, privacy-friendly APIs for third-party developers to build services that interact with Charter's internet and mobile networks, including connected device visibility, CPE management, home network optimization, and subscriber service controls. Access is provided through an authenticated developer portal with application registration and onboarding.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://corporate.charter.com/newsroom/charter-and-cablelabs-launch-bryte-iq-network-as-a-service-platform
    baseURL: https://bryteiq.spectrum.com
    tags:
      - NaaS
      - CAMARA
      - Network
      - IoT
      - Home Network
      - Broadband
    properties:
      - type: Documentation
        url: https://corporate.charter.com/newsroom/charter-and-cablelabs-launch-bryte-iq-network-as-a-service-platform

  - aid: charter:carrier-serviceability-api
    name: Spectrum Carrier Serviceability API
    description: The Spectrum Carrier Serviceability API enables carrier partners to submit address serviceability requests to determine Charter network coverage. Supports both single-address and batch address serviceability lookups. Authentication uses OAuth 2.0 and the API follows REST conventions with JSON payloads.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://enterprise.spectrum.com/support.html
    baseURL: https://eli-ws-carrier.charter.com
    tags:
      - Serviceability
      - Carrier
      - Address Lookup
      - OAuth 2.0
    properties:
      - type: Documentation
        url: https://enterprise.spectrum.com/support.html

